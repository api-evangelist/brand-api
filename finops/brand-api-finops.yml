specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Brand API (Brandfetch)
providerId: brand-api
publisherName: Brandfetch
serviceCategory: Brand Data API
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Brands
  - Logos
  - Brand Assets
  - Company Data
  - Firmographics
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Brandfetch: a free Logo API with a soft 500K-monthly fair-use
  ceiling, plus a flat $99/month Brand API subscription capped at 2,500 calls and Enterprise custom
  plans for higher volume and SLA.'
sources:
  - https://brandfetch.com/developers/pricing
  - https://docs.brandfetch.com/logo-api/rate-limits
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Brandfetch
  ServiceCategory: Brand Data API
  ProviderName: Brandfetch
  PublisherName: Brandfetch
  InvoiceIssuerName: Brandfetch
  BillingCurrency: USD
  PricingCategory: Standard
  PricingUnit: subscription-month
meters:
  - name: logo_api_requests
    description: Calls to the Logo API; metered for fair-use review against the 500K monthly soft cap.
    unit: request
    aggregation: sum
    dimensions:
      - domain
      - api_key
  - name: brand_api_calls
    description: Calls to the Brand API; counted against the 2,500/month subscription cap.
    unit: request
    aggregation: sum
    dimensions:
      - domain
      - api_key
  - name: subscription_month
    description: Brand API subscription fee billed monthly ($99/month, ~20% off annual).
    unit: month
    aggregation: sum
    dimensions:
      - plan
      - billing_cycle
principles:
  - name: Visibility
    description: Track Logo API request volume per consumer / domain and reconcile against the 500K
      soft monthly ceiling and the 2,500 hard Brand API cap; pull invoices from the Brandfetch dashboard.
  - name: Allocation
    description: Issue separate API keys per consuming product or surface so logo and brand-data spend
      can be attributed cleanly.
  - name: Optimization
    description: Cache logo URLs and brand records aggressively at the CDN / edge to stay within per-IP
      and per-customer 5-minute throughput windows; reserve Brand API calls for surfaces that need rich
      brand metadata; switch to Enterprise when sustained volume exceeds the Brand API hard cap.
  - name: Accountability
    description: Designate a brand-platform owner; alert when 5-minute or monthly thresholds approach
      exhaustion; budget annual billing for the 20% discount on Brand API.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
