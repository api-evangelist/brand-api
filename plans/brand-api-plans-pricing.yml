specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Brand API (Brandfetch)
providerId: brand-api
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Brands
  - Logos
  - Brand Assets
  - Company Data
  - Firmographics
description: Brandfetch ships two distinct APIs with separate pricing. The Logo API is free up to 500,000
  requests/month with no attribution badge required. The Brand API (rich brand data) is sold as a flat
  $99/month subscription capped at 2,500 calls/month, with a 20% discount when billed annually. Custom
  Enterprise plans cover larger volumes, SLAs, and flexible caching.
sources:
  - https://brandfetch.com/developers/pricing
  - https://docs.brandfetch.com/logo-api/rate-limits
plans:
  - id: brand-api-logo-api-free
    name: Logo API - Free
    type: freemium
    description: Free Logo API access with a generous fair-use monthly allowance and no attribution
      badge required.
    entries:
      - label: Logo API requests
        name: logo_requests
        type: quota
        metric: request
        limit: 500000
        timeFrame: month
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
    elements:
      - name: Logo API
      - name: No "powered by" badge required
  - id: brand-api-brand-api
    name: Brand API
    type: subscription
    description: Rich brand data API at a flat monthly subscription with a hard call cap.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: $99/month
        userMultiplied: false
      - label: Subscription (annual billing)
        name: subscription_annual
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: 20% off annual (~$79.20/month equivalent)
        userMultiplied: false
      - label: Brand API calls
        name: brand_api_calls
        type: quota
        metric: request
        limit: 2500
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Brand API
      - name: Rich Company Data
      - name: Brand Assets
  - id: brand-api-enterprise
    name: Enterprise
    type: enterprise
    description: Custom plan for high-volume Logo or Brand API usage, with SLA and flexible caching
      arrangements.
    entries:
      - label: Custom subscription
        name: enterprise_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
      - label: Custom volume
        name: enterprise_volume
        type: quota
        metric: request
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: SLA
      - name: Flexible Caching
      - name: Logo API
      - name: Brand API
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
