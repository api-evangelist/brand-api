specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Brand API (Brandfetch)
providerId: brand-api
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Brands
  - Logos
  - Brand Assets
  - Rate Limiting
description: Brandfetch enforces a soft 500,000 requests/month fair-use ceiling on the Logo API plus
  hard 5-minute throughput windows scoped per IP and per customer. Overages on the throughput windows
  return HTTP 429. The Brand API has a separate hard cap of 2,500 calls/month tied to its subscription.
sources:
  - https://docs.brandfetch.com/logo-api/rate-limits
  - https://brandfetch.com/developers/pricing
responseCodes:
  throttled: 429
limits:
  - name: Logo API monthly fair-use
    scope: account
    metric: requests_per_month
    limit: 500000
    timeFrame: month
    notes: Soft limit. Exceeding does not trigger immediate blocking.
  - name: Logo API per-IP throughput
    scope: ip
    metric: requests_per_5_minutes
    limit: 1000
    timeFrame: minute
    notes: Hard 1,000 requests every 5 minutes per IP. 429 on overage.
  - name: Logo API per-customer throughput
    scope: account
    metric: requests_per_5_minutes
    limit: 2400
    timeFrame: minute
    notes: Hard 2,400 requests every 5 minutes per customer. 429 on overage.
  - name: Brand API monthly cap
    scope: account
    metric: requests_per_month
    limit: 2500
    timeFrame: month
    notes: Hard cap on $99/month Brand API subscription.
policies:
  - name: Backoff Strategy
    description: Apply exponential backoff with jitter on 429 responses; respect any Retry-After header
      when present.
  - name: Soft vs Hard Limits
    description: The 500K monthly Logo API allowance is soft (fair-use); per-IP and per-customer 5-minute
      throughput windows are hard limits.
  - name: Caching
    description: Cache logo and brand responses aggressively client-side to stay inside the 5-minute
      throughput windows; Enterprise plans negotiate custom cache TTLs.
  - name: Capacity Increase
    description: Higher monthly volumes and SLAs require an Enterprise plan negotiated with Brandfetch.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
